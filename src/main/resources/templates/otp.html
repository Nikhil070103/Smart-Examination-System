```html
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>OTP Verification | Smart Examination System</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4f46e5,#7c3aed);
}

.card{
    width:400px;
    background:#fff;
    border-radius:20px;
    padding:35px;
    box-shadow:0 15px 35px rgba(0,0,0,0.2);
    text-align:center;
}

.card h2{
    color:#333;
    margin-bottom:10px;
}

.card p{
    color:#666;
    font-size:14px;
    margin-bottom:25px;
}

.input-group{
    margin-bottom:20px;
}

.input-group input{
    width:100%;
    padding:14px;
    border:2px solid #ddd;
    border-radius:10px;
    font-size:16px;
    text-align:center;
    letter-spacing:4px;
    transition:0.3s;
}

.input-group input:focus{
    outline:none;
    border-color:#4f46e5;
}

.btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#4f46e5;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    background:#4338ca;
}

.alert{
    margin-bottom:15px;
    padding:12px;
    border-radius:8px;
}

.error{
    background:#fee2e2;
    color:#dc2626;
}

.success{
    background:#dcfce7;
    color:#16a34a;
}

.email{
    color:#4f46e5;
    font-weight:600;
}
</style>

</head>
<body>

<div class="card">

    <h2>Email Verification</h2>

    <p>
        OTP has been sent to
        <span class="email" th:text="${email}"></span>
    </p>

    <div th:if="${error}" class="alert error"
         th:text="${error}">
    </div>

    <div th:if="${message}" class="alert success"
         th:text="${message}">
    </div>

    <form th:action="@{/verify-otp}" method="post">

        <input type="hidden"
               name="email"
               th:value="${email}">

        <div class="input-group">
            <input type="text"
                   name="otp"
                   maxlength="6"
                   placeholder="Enter 6 Digit OTP"
                   required>
        </div>

        <button type="submit" class="btn">
            Verify OTP
        </button>

    </form>

</div>

</body>
</html>
```

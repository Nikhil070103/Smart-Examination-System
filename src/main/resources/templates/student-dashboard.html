<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Student Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>

<div class="dashboard-container">
    <h1>Student Dashboard</h1>

    <div class="card-container">
        <div class="card" onclick="location.href='/student/profile'">
            <h3>My Profile</h3>
        </div>

        <div class="card" onclick="location.href='/student/exams'">
            <h3>View Exams</h3>
        </div>

        <div class="card" onclick="location.href='/student/results'">
            <h3>My Results</h3>
        </div>

        <div class="card" onclick="location.href='/logout'">
            <h3>Logout</h3>
        </div>
    </div>
</div>

</body>
</html>

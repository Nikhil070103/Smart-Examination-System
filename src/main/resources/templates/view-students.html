<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>View Students</title>
	<link rel="stylesheet" th:href="@{/css/view-students.css}">    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<div class="page-container">

    <!-- HEADER -->
    <div class="header">
        <div>
            <h1>View Students</h1>
            <p>Search, Filter, View, Edit & Delete Student Records</p>
        </div>

        <div class="admin-email">
            <span th:text="${admin.email}">admin@gmail.com</span>
        </div>
    </div>
    
    <!-- SUCCESS MESSAGE -->
	<div th:if="${successMessage != null}"
	     id="successAlert"
	     class="success-alert">
	    <p th:text="${successMessage}">
	        Success
	    </p>
	</div>

    <!-- SEARCH + FILTER -->
    <div class="filter-card">
        <form th:action="@{/admin/students/list}" method="get">

            <input type="text"
                   name="keyword"
                   th:value="${keyword}"
                   placeholder="Search by Name / Roll / Email">

            <!-- Course -->
            <select name="course">
                <option value="">All Courses</option>
                <option th:each="c : ${courses}"
                        th:value="${c}"
                        th:text="${c}"
                        th:selected="${c == course}">
                </option>
            </select>

            <!-- Semester -->
            <select name="semester">
                <option value="">All Semesters</option>
                <option th:each="s : ${semesters}"
                        th:value="${s}"
                        th:text="${s}"
                        th:selected="${s == semester}">
                </option>
            </select>

            <button type="submit">Search</button>

            <a href="/admin/students/list" class="reset-btn">
                Reset
            </a>
        </form>
    </div>

    <!-- STUDENT TABLE -->
    <div class="table-card">
        <h2>Student Records</h2>

        <div class="table-scroll">
            <table>
                <thead>
                <tr>
                    <th>Name</th>
                    <th>Roll No</th>
                    <th>Course</th>
                    <th>Semester</th>
                    <th>Face Status</th>
                    <th>Attempted</th>
                    <th>Not Attempted</th>
                    <th>Actions</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="s : ${students}">
                    <td th:text="${s.name}">Nikhil</td>
                    <td th:text="${s.rollNumber}">101</td>
                    <td th:text="${s.course}">MCA</td>
                    <td th:text="${s.semester}">4</td>

                    <!-- FACE STATUS -->
                    <td>
                        <span th:if="${s.faceImage != null}"
                              class="status active">
                            Registered
                        </span>

                        <span th:if="${s.faceImage == null}"
                              class="status pending">
                            Pending
                        </span>
                    </td>

                    <!-- Attempted -->
                    <td th:text="${attemptedMap[s.id]}">0</td>

                    <!-- Not Attempted -->
                    <td th:text="${notAttemptedMap[s.id]}">0</td>

                    <!-- ACTIONS -->
                    <td class="action-box">

                        <a th:href="@{/admin/students/view/{id}(id=${s.id})}"
                           class="view-btn">
                            View
                        </a>

                        <a th:href="@{/admin/students/edit/{id}(id=${s.id})}"
                           class="edit-btn">
                            Edit
                        </a>

                       <a th:href="@{/admin/students/delete/{id}(id=${s.id})}"
						   onclick="return confirm('Are you sure you want to delete this student?')"
						   class="delete-btn">
						    Delete
						</a>

                    </td>
                </tr>

                <!-- Empty -->
                <tr th:if="${students == null or students.isEmpty()}">
                    <td colspan="8" class="empty-row">
                        No students found
                    </td>
                </tr>

                </tbody>
            </table>
        </div>
    </div>

    <!-- BACK -->
    <div class="back-wrap">
        <a href="/admin/dashboard" class="back-btn">
            ← Back Dashboard
        </a>
    </div>

</div>
<script>
window.addEventListener("load", function () {
    const alertBox = document.getElementById("successAlert");

    if (alertBox) {
        setTimeout(() => {
            alertBox.style.opacity = "0";
            alertBox.style.transform = "translateY(-10px)";

            setTimeout(() => {
                alertBox.style.display = "none";
            }, 500);

        }, 5000); // 5 sec
    }
});
</script>
</body>
</html>

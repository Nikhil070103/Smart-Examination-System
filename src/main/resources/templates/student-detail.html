<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Student Detail</title>
    <link rel="stylesheet" th:href="@{/css/student-detail.css}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<div class="page-container">

    <!-- HEADER -->
    <div class="header">
        <div>
            <h1>Student Profile</h1>
            <p>Complete Student Details & Exam Performance</p>
        </div>

        <div class="admin-email">
            <span th:text="${admin.email}">admin@gmail.com</span>
        </div>
    </div>

    <!-- TOP PROFILE -->
    <div class="profile-card">

        <div class="avatar-box">
            <div class="avatar"
                 th:text="${#strings.substring(student.name,0,1)}">
                S
            </div>
        </div>

        <div class="student-info">
            <h2 th:text="${student.name}">Nikhil Agarwal</h2>
            <p th:text="${student.course + ' | Semester ' + student.semester}">
                MCA | Semester 4
            </p>

            <span th:if="${student.faceImage != null}"
                  class="status active">
                Face Registered
            </span>

            <span th:if="${student.faceImage == null}"
                  class="status pending">
                Face Pending
            </span>
        </div>
    </div>

    <!-- GRID -->
    <div class="detail-grid">

        <!-- PERSONAL -->
        <div class="card">
            <h3>Personal Details</h3>

            <div class="info-box">
                <label>Father Name</label>
                <p th:text="${student.fatherName}"></p>
            </div>

            <div class="info-box">
                <label>Date of Birth</label>
                <p th:text="${student.dob}"></p>
            </div>

            <div class="info-box">
                <label>Gender</label>
                <p th:text="${student.gender}"></p>
            </div>

            <div class="info-box">
                <label>Mobile</label>
                <p th:text="${student.mobile}"></p>
            </div>

            <div class="info-box">
                <label>Address</label>
                <p th:text="${student.address}"></p>
            </div>
        </div>

        <!-- ACADEMIC -->
        <div class="card">
            <h3>Academic Details</h3>

            <div class="info-box">
                <label>Roll Number</label>
                <p th:text="${student.rollNumber}"></p>
            </div>

            <div class="info-box">
                <label>Enrollment</label>
                <p th:text="${student.enrollmentNumber}"></p>
            </div>

            <div class="info-box">
                <label>Course</label>
                <p th:text="${student.course}"></p>
            </div>

            <div class="info-box">
                <label>Branch</label>
                <p th:text="${student.branch}"></p>
            </div>

            <div class="info-box">
                <label>Semester</label>
                <p th:text="${student.semester}"></p>
            </div>

            <div class="info-box">
                <label>Section</label>
                <p th:text="${student.section}"></p>
            </div>

            <div class="info-box">
                <label>Session</label>
                <p th:text="${student.session}"></p>
            </div>
        </div>

        <!-- LOGIN -->
        <div class="card">
            <h3>Login Details</h3>

            <div class="info-box">
                <label>Email</label>
                <p th:text="${student.user.email}"></p>
            </div>

            <div class="info-box">
                <label>Role</label>
                <p th:text="${student.user.role}"></p>
            </div>
        </div>

        <!-- EXAM PERFORMANCE -->
        <div class="card">
            <h3>Exam Performance</h3>

            <div class="info-box">
                <label>Total Exams</label>
                <p th:text="${totalExams}">0</p>
            </div>

            <div class="info-box">
                <label>Attempted</label>
                <p th:text="${attempted}">0</p>
            </div>

            <div class="info-box">
                <label>Not Attempted</label>
                <p th:text="${notAttempted}">0</p>
            </div>

            <div class="info-box">
                <label>Average Score</label>
                <p th:text="${avgScore + '%'}">0%</p>
            </div>

            <div class="info-box">
                <label>Highest Score</label>
                <p th:text="${highestScore}">0</p>
            </div>

            <div class="info-box">
                <label>Last Attempt</label>
                <p th:text="${lastAttempt}"></p>
            </div>
        </div>
    </div>

    <!-- ACTION -->
    <div class="btn-group">

        <a th:href="@{/admin/students/edit/{id}(id=${student.id})}"
           class="edit-btn">
            Edit Student
        </a>

        <a href="/admin/students/list"
           class="back-btn">
            Back to Students
        </a>

    </div>

</div>

</body>
</html>

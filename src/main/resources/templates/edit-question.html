<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Question</title>
    <link rel="stylesheet" th:href="@{/css/add-question.css}">
</head>
<body>

<div class="container">

    <h2>Edit Question</h2>

    <form th:action="@{/admin/questions/update/{qid}/{eid}(qid=${question.id},eid=${examId})}" 
          th:object="${question}" method="post">

        <label>Question:</label>
        <input type="text" th:field="*{questionTitle}" required>

        <label>Option A:</label>
        <input type="text" th:field="*{optionA}" required>

        <label>Option B:</label>
        <input type="text" th:field="*{optionB}" required>

        <label>Option C:</label>
        <input type="text" th:field="*{optionC}" required>

        <label>Option D:</label>
        <input type="text" th:field="*{optionD}" required>

        <label>Correct Answer:</label>
        <select th:field="*{correctAnswer}">
            <option value="A">A</option>
            <option value="B">B</option>
            <option value="C">C</option>
            <option value="D">D</option>
        </select>

        <button type="submit">Update Question</button>
    </form>

</div>

</body>
</html>

spring.application.name=SES

# ================================
# RAILWAY DATABASE (Production)
# ================================
spring.datasource.url=jdbc:mysql://<RAILWAY_DB_HOST>:<RAILWAY_DB_PORT>/<RAILWAY_DB_NAME>
spring.datasource.username=<RAILWAY_DB_USER>
spring.datasource.password=<RAILWAY_DB_PASSWORD>
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ================================
# JPA / Hibernate
# ================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ================================
# MAIL CONFIG
# ================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=<YOUR_GMAIL>
spring.mail.password=<YOUR_APP_PASSWORD>
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ================================
# BASE URL (public Railway URL)
# ================================
app.base-url=https://smart-exam-system.up.railway.app

ses.superadmin.email=agrawalnikhilcoc007@gmail.com

# ================================
# SERVER PORT (optional, Railway will set automatically)
# ================================
server.port=${PORT:8080}
